steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--region=${_REGION}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--add-cloudsql-instances=${_SQL_CONNECTION}'
      - '--set-env-vars=DB_USERNAME=verdant,DB_URL=jdbc:postgresql:///verdant?cloudSqlInstance=${_SQL_CONNECTION}&socketFactory=com.google.cloud.sql.postgres.SocketFactory'
      - '--set-secrets=DB_PASSWORD=verdant-db-password:latest,GEMINI_API_KEY=verdant-gemini-key:latest,ADMIN_PASSWORD=verdant-admin-password:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'

substitutions:
  _REGION: europe-north1
  _REPO: verdant
  _SERVICE: verdant-api
  _SQL_CONNECTION: verdant-planner-staging:europe-north1:verdant-staging

options:
  logging: CLOUD_LOGGING_ONLY
