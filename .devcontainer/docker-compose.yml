services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    user: vscode
    working_dir: /workspaces/verdant
    volumes:
      - .:/workspaces/verdant:cached
      - gradle-cache:/home/vscode/.gradle
      - node-modules-cache:/home/vscode/.npm
      - ${HOME}/.claude:/home/vscode/.claude
    command: sleep infinity
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/verdant
      DB_USERNAME: verdant
      DB_PASSWORD: verdant
      # Redundant with the Dockerfile ENV, but explicit so `docker compose
      # exec` and devcontainer feature scripts see the right values.
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

volumes:
  gradle-cache:
  node-modules-cache:
