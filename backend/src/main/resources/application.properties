quarkus.datasource.db-kind=postgresql

# Dev Services will auto-start a Postgres container in dev/test mode
quarkus.datasource.devservices.image-name=postgres:17
quarkus.datasource.devservices.db-name=verdant

# Production datasource (env vars set by Cloud Run / .env.yaml)
%prod.quarkus.datasource.username=${DB_USERNAME:verdant}
%prod.quarkus.datasource.password=${DB_PASSWORD:verdant}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/verdant}

# Flyway manages schema
quarkus.flyway.migrate-at-start=true

quarkus.http.port=8080
%dev.quarkus.http.port=8081
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

smallrye.jwt.sign.key.location=classpath:privateKey.pem
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=verdant-api

# Prod: keys are mounted as files from Secret Manager (not available in classpath via git)
%prod.smallrye.jwt.sign.key.location=file:/app/secrets/privateKey.pem
%prod.mp.jwt.verify.publickey.location=file:/app/secrets/publicKey.pem

quarkus.log.level=INFO

# Serve admin SPA — route non-API, non-file paths to index.html
quarkus.http.enable-compression=true
quarkus.http.non-application-root-path=/q

# Serialize Instant as ISO-8601 strings (not numeric timestamps)
quarkus.jackson.write-dates-as-timestamps=false

verdant.gemini.api-key=${GEMINI_API_KEY:}
verdant.gcs.service-account-key=${GCS_SERVICE_ACCOUNT_KEY:}

verdant.admin.email=${ADMIN_EMAIL:verdant@l2c.se}
verdant.admin.password=${ADMIN_PASSWORD:}
